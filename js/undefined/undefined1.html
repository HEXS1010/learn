<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>undefined</title>
  </head>
  <body>
    <!-- undefined  -->
    <!-- adalah sebuah kata kunci di javaScript // sebuah tipe data -->
    <!-- sebuah variabel yang belum ditambahkan nilainya, maka artinya variabel tersebut merupakan tipe undefined  -->
    <!-- undefined itu berbeda dengan null dibahasa pemrograman lain -->

    <script>
      let name;
      if (name === undefined) {
        alert("UNDEFINDE");
      } else {
        alert("DEFINED");
      }
    </script>
  </body>
</html>
