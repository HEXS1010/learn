<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>statements</title>
</head>
<body>
    <p id="demo"></p>
    <p id="value"></p>
    <script>
        let x, y, z;
        x = 6;
        y = 5;
        z = x + y;

        document.getElementById("demo").innerHTML = "nilai z: " + z;
        document.getElementById("value").innerHTML = "nilai dari x, y, z adalah: " + x + y + z;


    </script>
</body>
</html>
