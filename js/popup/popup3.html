<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>confirm</title>
</head>
<body>
    <script>
        const masuk = confirm("anda yakin mau masuk ?");

        if (masuk) {
            const name = prompt("siapa nama anda ?");
            alert(`selamat datang ${name}`);
        } else {
            alert("bye bye");
        }
    </script>
</body>
</html>
