<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>semantic html</title>
  </head>
  <body>
    <!-- bagian atas halaman -->
    <header></header>

    <!-- menu navigasi -->
    <nav></nav>

    <!-- konten utama -->
    <main></main>

    <!-- artikel atau konten mandiri seperti post blog, berita, dsb -->
    <article></article>

    <!-- bagian dari halaman -->
    <section></section>
    <!-- atau bagian tertentu dari konten, bisa berisi heading dan paragraf -->

    <!-- sidebar atau info tambahan -->
    <aside></aside>

    <!-- bagian bawah halaman, atau informasi penutup -->
    <footer></footer>
    <!-- seperti copyright, link tambahan, dll -->

    <!-- kontainer untuk gambar, grafik, dsb -->
    <figure></figure>

    <!-- keterangan untuk tag figure -->
    <figcaption></figcaption>
  </body>
</html>
