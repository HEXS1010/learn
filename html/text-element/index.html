<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heading, paragraf, dan line break</title>
  </head>
  <body>
    <!-- kita belajar heading, heading adalah judul atau bisa dibilang penanda -->
    <h1>halo</h1>
    <h2>halo</h2>
    <h3>halo</h3>
    <h4>halo</h4>
    <h5>halo</h5>
    <h6>halo</h6>
    <!-- heading memiliki ukurannya masing masing, semakin besar semakan kecil ukurannya -->
    <!-- h1 hanya digunakan satu kali dalam satu halaman sebagia judul -->
    <!-- sisanya digunakan untuk membuat struktur dan hierari konten -->

    <!-- kalau tag p hanya untuk menulis biasa -->
     <p>ini adalah paragraf pertama</p>
     <p>ini adalah paragraf kedua</p>

     <!-- lline break atau br, fungsinya adalah ganti baris, atau bisa dibilang enter lah yah -->
      <p>halo nama aku udin <br>
        umurku 7tahun <br>
        hobiku adalah main sepak bola
      </p>
  </body>
</html>
