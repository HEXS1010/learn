<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>audio dan video</title>
  </head>
  <body>
    <!-- struktur dasar -->
    <audio controls autoplay muted loop>
      <source
        src="mixkit-game-show-suspense-waiting-667.wav"
        type="audio/mpeg"
      />
      Browser Anda tidak mendukung audio.
    </audio>
    <!-- controls: agar menampilkan control play, pause, speaker  -->
    <!-- format yang didukung .mp3, .oog, .wav -->

    <!-- struktur video -->
    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>
    <!-- format yang didukung .mp4, .webm, .oog -->
  </body>
</html>
