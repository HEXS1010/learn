<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <!-- struktur dasar tag form -->
    <form action="/proses" method="POST">
      <label>Nama:</label>
      <input type="text" name="nama" />
      <button type="submit">Kirim</button>
    </form>
    <!-- action: url tujuan saat form dikirim -->
    <!-- method: cara pengiriman data (GET atau POST) -->

    <!-- element input yang sering dipakai -->
    <input type="text" name="nama" />
    <!-- email input -->
    <input type="email" name="email" />
    <!-- password input -->
    <input type="password" name="password" />
    <!-- textarea untuk input teks panjang -->
    <textarea name="pesan" rows="4" cols="40" id=""></textarea>
    <!-- radio button -->
    <input type="radio" name="gender" value="laki-laki" /> laki-laki
    <input type="radio" name="gender" value="perempuan" /> perempuan
    <!-- checkbox -->
    <input type="checkbox" name="hobi" value="membaca" /> Membaca
    <input type="checkbox" name="hobi" value="ngoding" /> Ngoding
    <!-- select dropdown -->
    <select name="kota">
      <option value="jakarta">Jakarta</option>
      <option value="bandung">Bandung</option>
      <option value="surabaya">Surabaya</option>
    </select>

    <!-- tombol submit -->
    <button type="submit">kirim</button>
    <input type="submit" value="kirim" />
  </body>
</html>
