<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <!-- struktur dasar tag form -->
    <form action="/proses" method="POST">
      <label>Nama:</label>
      <input type="text" name="nama" />
      <button type="submit">Kirim</button>
    </form>
    <!-- action: url tujuan saat form dikirim -->
    <!-- method: cara pengiriman data (GET atau POST) -->

    <!-- element input yang sering dipakai -->
    <input type="text" name="nama" />
    <!-- email input -->
    <input type="email" name="email" />
    <!-- password input -->
    <input type="password" name="password" />
    <!-- textarea untuk input teks panjang -->
    <textarea name="pesan" rows="4" cols="40" id=""></textarea>
  </body>
</html>
