<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>img tag</title>
  </head>
  <body>
    <!-- struktur img -->
    <img src="gambar.png" alt="ini gambar anak yang sedang bermain bola" />
    <!-- src adalah sumber gambar, kalau alt digunakan jika gambar rusak maka akan muncul tulisan yang menjelaskan gambar -->

    <!-- menampilkan gambar dari folder lokal -->
    <img src="logo.png" alt="logo saya" />
    <img src="img/logo.png" alt="logo saya" />

    <!-- gambar yang ditampilkan dari internet -->
    <img src="https://gambar_bakso_enak.png" alt="bakso" />

    <!-- mengatur ukutan gambar -->
     <img src="logo.png" alt="logo" width="200">
     <img src="logo.png" alt="logo" style="width: 200px; height: auto;">
  </body>
</html>
