<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>format text</title>
  </head>
  <body>
    <!-- membuat text tebal pakai strong atau b -->
    <p>halo namaku <strong>udin anjay mabar</strong> salam kenal</p>
    <p>halo namaku <b>udin anjay mabar</b> salam kenal</p>
    <!-- bedanya kalau strong memiliki makna semantic artinya kata tersebut penting, ini juga membantu pengguna tunanetra saat pakai screen reader -->
    <!-- kalau b yah cuma tebal biasa aja -->

    <!-- membuat text miring -->
    <p>aku mau buat baju <em>batik</em> yang memiliki cerita alam</p>
    <p>aku mau buat baju <i>batik</i> yang memiliki cerita alam</p>
    <!-- sama seperti sebelumnya em semantic dan i hanya biasa aja -->

    <!-- membuat garis bawah dan coret -->
    <p><u>klik saya</u></p>
    <p><s>salah ketik</s></p>

    <!-- superscript dan subscript -->
    <p>contoh rumus kimia air: H<sub>2</sub>0</p>
    <p>rumus pythagoras: x<sup>2</sup> + y<sup>2</sup> = c<sup>2</sup></p>
    <!-- kalau ini buat yang matematika atau kimia yah bisa buat apa aja -->
    <!-- kalau sub turun kalau sup naik -->
  </body>
</html>
