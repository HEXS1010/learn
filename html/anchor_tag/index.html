<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anchor tag</title>
  </head>
  <body>
    <!-- struktur dasar -->
    <a href="https://www.google.com">google</a>

    <!-- link ke website eksternal -->
    <a href="https://webku.com">yuk lihat webku</a>
    <a href="https://webku.com" target="_blank" rel="noopener noreferrer"
      >yuk lihat webku</a
    >
    <!-- kalau mau pakai target blank itu artinya terbuka di tab baru-->
    <!-- jangan lupa pakai rel noopener noreferrer -->
  </body>
</html>
