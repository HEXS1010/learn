<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ul dan ol</title>
</head>
<body>
    <!-- ul adalah list yang tidak berurut -->
     <ul>
        <li>html</li>
        <li>css</li>
        <li>javascript</li>
     </ul>

     <!-- ol itu berurutan -->
      <ol>
        <li>html</li>
        <li>css</li>
        <li>javascript</li>
      </ol>
      <!-- ini hasilnya angka satu dan seterusnya -->
       <!-- A huruf besar, a huruf kecil, I angka romawi besar, i angka romawi kecil -->
</body>
</html>
