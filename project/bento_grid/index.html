<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bento grid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid-container">
      <div class="box" style="grid-area: box-1">
        <img src="https://picsum.photos/id/1015/600/900" alt="Gambar 1" />
      </div>

      <div class="box" style="grid-area: box-2">
        <img src="https://picsum.photos/id/1018/800/400" alt="Gambar 2" />
      </div>

      <div class="box" style="grid-area: box-3">
        <img src="https://picsum.photos/id/1025/400/400" alt="Gambar 3" />
      </div>

      <div class="box" style="grid-area: box-4">
        <img src="https://picsum.photos/id/1035/400/400" alt="Gambar 4" />
      </div>

      <div class="box" style="grid-area: box-5">
        <img src="https://picsum.photos/id/1043/800/400" alt="Gambar 5" />
      </div>
    </div>
  </body>
</html>
