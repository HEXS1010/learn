<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="borders1.css">
</head>
<body>

    <!-- solid -->
    <div class="box1">
        <h1>1</h1>
    </div>

    <!-- dashed -->
    <div class="box2">
        <h1>2</h1>
    </div>

    <!-- dotted -->
    <div class="box3">
        <h1>3</h1>
    </div>

    <!-- double -->
    <div class="box4">
        <h1>4</h1>
    </div>

    <!-- groove -->
    <div class="box5">
        <h1>5</h1>
    </div>

    <!-- ridge -->
    <div class="box6">
        <h1>6</h1>
    </div>

    <!-- inset -->
    <div class="box7">
        <h1>7</h1>
    </div>

    <!-- outset -->
    <div class="box8">
        <h1>8</h1>
    </div>
</body>
</html>
